<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <!-- БЛОК "КОНТАКТЫ" -->
    <section>
      <div>
        <h2>Контакты</h2>
        <p>Свяжитесь с нами, чтобы обсудить ваш проект</p>
      </div>
      <div>
        <div>
          <p>📍 Санкт-Петербург / Москва / Online</p>
          <p>📧 hello@waveform.ru</p>
          <p>📞 +7 (999) 999-99-99</p>
          <div>
            <p>Соцсети:</p>
            <ul>
              <li><a href="#">VK</a></li>
              <li><a href="#">Telegram</a></li>
            </ul>
          </div>
        </div>
        <div>
          <form>
            <p>
              <label for="name">Имя:</label><br>
              <input type="text" id="name" name="name" placeholder="Иван">
            </p>
            <p>
              <label for="email">Email:</label><br>
              <input type="email" id="email" name="email" placeholder="user@example.com">
            </p>
            <p>
              <label for="msg">Сообщение:</label><br>
              <textarea id="msg" name="message" rows="3" placeholder="Расскажите о задаче..."></textarea>
            </p>
            <button type="submit">Отправить</button>
          </form>
        </div>
      </div>
    </section>
</body>
</html>
