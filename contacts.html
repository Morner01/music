<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVEFORM - Контакты</title>
  <link rel="stylesheet" href="css\contacts.css">
</head>
<body>
  <header>
    <div>
      <!-- Навигационное меню -->
      <nav class="logo">
        <!-- Контакты -->
        <div>
          <strong>WAVEFORM</strong>
        </div>
        <ul class="about-ul">
          <li><a href="index.html">Главная</a></li>
          <li><a href="services.html" class="services-btn" target="_blank">Услуги</a></li>
          <li><a href="#">Портфолио</a></li>
          <li><a href="contacts.html" class="contact-btn" target="_blank">Контакты</a></li>
        </ul>
      </nav>
    </div>
  </header>
        <!-- Блок "Контакты" -->
    <section>
      <div>
        <p>Свяжитесь с нами, чтобы обсудить ваш проект</p>
      </div>
      <div>
        <div>
          <p>📍 Санкт-Петербург / Онлайн</p>
          <p>📧 hello@waveform.ru</p>
          <div>
            <p>Соцсети:</p>
            <ul>
              <li><a href="#">VK</a></li>
              <li><a href="#">Max</a></li>
            </ul>
          </div>
        </div>
        <div>
          <form class="user-form" id="contactForm">
            <p>
              <label for="name">Имя:</label><br>
              <input type="text" id="name" name="name" placeholder="Иван">
            </p>
            <p>
              <label for="email">Email:</label><br>
              <input type="email" id="email" name="email" placeholder="user@example.com">
            </p>
            <p>
              <label for="msg">Сообщение:</label><br>
              <textarea id="msg" name="message" rows="3" placeholder="Расскажите о задаче..."></textarea>
            </p>
            <button type="submit" id="submitButton">Отправить</button>
          </form>
          <script src="JS/contacts.js"></script>
        </div>
      </div>
    </section>
</body>
</html>
